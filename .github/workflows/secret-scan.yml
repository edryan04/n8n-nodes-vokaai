name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Daily catch-up scan in case of historical leaks introduced before this workflow.
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so PR scans see the complete diff
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No gitleaks license needed for public repos
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
