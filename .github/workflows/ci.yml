name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR / branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint + Build + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.15'
          cache: 'npm'

      - name: Install
        # --ignore-scripts skips native compilation of `isolated-vm`, a
        # transitive dep of `n8n-workflow`. We only need the n8n-workflow
        # TYPES at build/lint time; the runtime isolated-vm binary is
        # provided by n8n at runtime, not by us. Skipping scripts shaves
        # ~2 min off the install AND avoids the v8 API mismatch that
        # breaks isolated-vm's gyp build against newer Node minor versions.
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Typecheck + Build
        run: npm run build

      - name: Verify dist artifacts
        run: |
          test -f dist/credentials/VokaaiApi.credentials.js
          test -f dist/nodes/Vokaai/Vokaai.node.js
          test -f dist/nodes/Vokaai/vokaai.svg
          test -f dist/nodes/VokaaiTrigger/VokaaiTrigger.node.js
          test -f dist/nodes/VokaaiTrigger/vokaai.svg
          echo "All expected dist artifacts present."
